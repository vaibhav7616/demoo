---
apiVersion: v1
kind: Namespace
metadata:
  name: odoo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: odoo
data:
  APP_VERSION: "PLACEHOLDER_VERSION"
  BUILD_NUMBER: "PLACEHOLDER_BUILD"
  odoo.conf: |
    [options]
    admin_passwd = admin_password
    addons_path = /usr/lib/python3/dist-packages/odoo/addons
    data_dir = /var/lib/odoo
    db_host = postgres-service
    db_port = 5432
    db_user = odoo
    db_password = odoo123
    db_name = odoo
    http_port = 8069
    log_level = info
    workers = 0
    max_cron_threads = 1

---
apiVersion: v1
kind: Secret
metadata:
  name: odoo-db-secret
  namespace: odoo
type: Opaque
stringData:
  db_password: "odoo123"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-deployment
  namespace: odoo
  labels:
    app: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: odoo
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until pg_isready -h postgres-service -U odoo -d odoo; do
                sleep 3
              done

          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: db_password

      containers:
        - name: odoo
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: Always

          ports:
            - containerPort: 8069
            - containerPort: 8072

          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: APP_VERSION

            - name: BUILD_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: BUILD_NUMBER

            - name: HOST
              value: "postgres-service"

            - name: USER
              value: "odoo"

            - name: PASSWORD
              value: "odoo123"

            - name: DB_HOST
              value: "postgres-service"

            - name: DB_USER
              value: "odoo"

            - name: DB_PASSWORD
              value: "odoo123"

          readinessProbe:
            tcpSocket:
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 20

          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-config-volume
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf

      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-pvc
        - name: odoo-config-volume
          configMap:
            name: odoo-config

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-pvc
  namespace: odoo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: "odoo"
            - name: POSTGRES_USER
              value: "odoo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: db_password

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: odoo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
