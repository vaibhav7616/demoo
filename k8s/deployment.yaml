---
# ── Namespace ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: odoo

---
# ── ConfigMap: non-secret config ────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: odoo
data:
  APP_VERSION: "{{APP_VERSION}}"       # Replaced by Jenkins sed command
  BUILD_NUMBER: "{{BUILD_NUMBER}}"

---
# ── Secret: DB credentials (base64 encode your values) ────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: odoo-db-secret
  namespace: odoo
type: Opaque
stringData:
  db_password: "odoo_password"         # Replace with your real password

---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-deployment
  namespace: odoo
  labels:
    app: odoo
    version: "{{APP_VERSION}}"         # Replaced by Jenkins
  annotations:
    app.version: "{{APP_VERSION}}"
    build.number: "{{BUILD_NUMBER}}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: odoo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0                # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: odoo
        version: "{{APP_VERSION}}"     # Shows in: kubectl get pods --show-labels
      annotations:
        # Changing this annotation forces a pod restart even if image didn't change
        deployment.kubernetes.io/revision: "{{BUILD_NUMBER}}"
    spec:
      containers:
        - name: odoo
          image: "{{IMAGE_TAG}}"       # e.g. your-user/odoo:v3  — replaced by Jenkins
          imagePullPolicy: Always      # Always pull so :latest is never stale
          ports:
            - containerPort: 8069
              name: http
            - containerPort: 8072
              name: longpolling

          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: APP_VERSION
            - name: BUILD_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: BUILD_NUMBER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: db_password
            - name: HOST
              value: "postgres-service"
            - name: USER
              value: "odoo"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: db_password

          args:
            - "--config=/etc/odoo/odoo.conf"
            - "--init=base"
            - "-d"
            - "odoo"
            - "--without-demo=all"

          # ── Probes ──────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 5

          # ── Version label exposed as env inside pod ─────────────────
          # Check with: kubectl exec <pod> -- printenv APP_VERSION

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-logs
              mountPath: /var/log/odoo

      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-pvc
        - name: odoo-logs
          emptyDir: {}

      imagePullSecrets:
        - name: docker-registry-secret   # kubectl create secret docker-registry ...

---
# ── PersistentVolumeClaim ───────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-pvc
  namespace: odoo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# ── PostgreSQL Deployment (sidecar DB) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: odoo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "odoo"
            - name: POSTGRES_USER
              value: "odoo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: db_password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: odoo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
